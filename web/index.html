<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NBBB 电商平台 - 时尚服装购物网站">
    <meta name="keywords" content="服装,时尚,购物,电商">
    <title>NBBB - 时尚服装购物平台</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/web/css/style.css">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/web/">
                <span class="text-primary">NBBB</span> 商城
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/web/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/web/products.html">全部商品</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="categoryDropdown" role="button" data-bs-toggle="dropdown">
                            分类
                        </a>
                        <ul class="dropdown-menu" id="categoryMenu">
                            <li><a class="dropdown-item" href="#">加载中...</a></li>
                        </ul>
                    </li>
                </ul>
                
                <!-- 搜索框 -->
                <form class="d-flex me-3" id="searchForm">
                    <input class="form-control" type="search" placeholder="搜索商品..." id="searchInput" aria-label="Search">
                    <button class="btn btn-outline-primary" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
                
                <!-- 用户菜单 -->
                <div class="d-flex align-items-center">
                    <a href="/web/cart.html" class="btn btn-link text-dark position-relative me-2">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount" style="display: none;">0</span>
                    </a>
                    <a href="/web/profile.html" class="btn btn-link text-dark" id="userMenu">
                        <i class="bi bi-person-circle fs-5"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Banner 轮播 -->
    <section class="banner-section">
        <div id="bannerCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators" id="bannerIndicators"></div>
            <div class="carousel-inner" id="bannerInner"></div>
            <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </section>

    <!-- 商品分类 -->
    <section class="category-section py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-4">商品分类</h2>
            <div class="row g-4" id="categoryGrid"></div>
        </div>
    </section>

    <!-- 热门商品 -->
    <section class="products-section py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">热门商品</h2>
                <a href="/web/products.html" class="btn btn-outline-primary">查看更多 <i class="bi bi-arrow-right"></i></a>
            </div>
            <div class="row g-4" id="hotProductsGrid"></div>
        </div>
    </section>

    <!-- 推荐商品 -->
    <section class="products-section py-5 bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">为您推荐</h2>
                <a href="/web/products.html" class="btn btn-outline-primary">查看更多 <i class="bi bi-arrow-right"></i></a>
            </div>
            <div class="row g-4" id="recommendedProductsGrid"></div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4">
                    <h5>关于我们</h5>
                    <p class="text-muted">NBBB 是一个专注于时尚服装的电商平台，为您提供优质的商品和贴心的服务。</p>
                </div>
                <div class="col-md-4">
                    <h5>快速链接</h5>
                    <ul class="list-unstyled">
                        <li><a href="/web/products.html" class="text-muted text-decoration-none">全部商品</a></li>
                        <li><a href="#" class="text-muted text-decoration-none">关于我们</a></li>
                        <li><a href="#" class="text-muted text-decoration-none">联系我们</a></li>
                        <li><a href="#" class="text-muted text-decoration-none">帮助中心</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h5>关注我们</h5>
                    <div class="d-flex gap-3">
                        <a href="#" class="text-white"><i class="bi bi-wechat fs-4"></i></a>
                        <a href="#" class="text-white"><i class="bi bi-weibo fs-4"></i></a>
                        <a href="#" class="text-white"><i class="bi bi-twitter fs-4"></i></a>
                    </div>
                    <p class="text-muted mt-3 small">© 2025 NBBB. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义JS -->
    <script src="/web/js/main.js"></script>
</body>
</html>
